name: golangci-lint

on:
  push:
    branches:
      - master
      - main
    tags:
      - v*
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - converted_to_draft
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: golangci-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and Security
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Run golangci-lint (typecheck excluded)
        run: |
          set -euo pipefail
          golangci-lint run --config=golangci.yml --timeout=5m --out-format json --issues-exit-code=0 ./... > golangci.json

          non_typecheck_issues="$(jq '[ (.Issues // [])[] | select(.FromLinter != "typecheck") ] | length' golangci.json)"
          if [ "${non_typecheck_issues}" -eq 0 ]; then
            echo "No non-typecheck golangci-lint issues found."
            exit 0
          fi

          echo "golangci-lint issues (excluding typecheck):"
          jq -r '.Issues // [] | .[] | select(.FromLinter != "typecheck") | "\(.Pos.Filename):\(.Pos.Line):\(.Pos.Column): \(.Text) (\(.FromLinter))"' golangci.json
          exit 1

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
